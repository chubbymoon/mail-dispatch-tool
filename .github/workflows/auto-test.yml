name: Auto Test - Build and Verify

on:
  # 每次推送到 main 分支时自动触发
  push:
    branches: [ main, master ]
  # 每次创建 Pull Request 时触发
  pull_request:
    branches: [ main, master ]
  # 手动触发
  workflow_dispatch:
  # 定时触发（每周一早上 8 点）
  schedule:
    - cron: '0 8 * * 1'

jobs:
  # ========== Windows 测试 ==========
  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl xlrd pyinstaller
    
    - name: Build Windows executable
      run: |
        pyinstaller --onefile --name "邮件分发-Windows" --clean "邮件分发.py"
    
    - name: Test Windows executable - Help
      run: |
        .\dist\邮件分发-Windows.exe --help
    
    - name: Test Windows executable - Config file
      run: |
        @"
        # ===== 发件人配置 =====
        sender_name = 测试用户
        sender_email = test@example.com
        auth_code = test123
        smtp_host = smtp.163.com
        smtp_port = 465
        "@ | Out-File -FilePath sender_config.txt -Encoding UTF8
        
        .\dist\邮件分发-Windows.exe --preview-only
      continue-on-error: true
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: 邮件分发-Windows
        path: dist/邮件分发-Windows.exe

  # ========== macOS 测试 ==========
  test-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl xlrd pyinstaller
    
    - name: Build macOS executable
      run: |
        pyinstaller --onefile --name "邮件分发-macOS" --clean "邮件分发.py"
    
    - name: Test macOS executable - Help
      run: |
        chmod +x ./dist/邮件分发-macOS
        ./dist/邮件分发-macOS --help
    
    - name: Test macOS executable - Config file
      run: |
        cat > sender_config.txt << 'EOF'
        # ===== 发件人配置 =====
        sender_name = 测试用户
        sender_email = test@example.com
        auth_code = test123
        smtp_host = smtp.163.com
        smtp_port = 465
        EOF
        
        ./dist/邮件分发-macOS --preview-only
      continue-on-error: true
    
    - name: Check macOS file structure
      run: |
        echo "=== 文件信息 ==="
        ls -la ./dist/邮件分发-macOS
        file ./dist/邮件分发-macOS
        
        echo "=== 文件大小 ==="
        du -h ./dist/邮件分发-macOS
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v4
      with:
        name: 邮件分发-macOS
        path: dist/邮件分发-macOS

  # ========== 测试结果汇总 ==========
  test-summary:
    needs: [test-windows, test-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    
    - name: Generate test report
      run: |
        echo "# 测试报告" > test-report.md
        echo "" >> test-report.md
        echo "## 测试时间" >> test-report.md
        echo "$(date '+%Y-%m-%d %H:%M:%S')" >> test-report.md
        echo "" >> test-report.md
        echo "## 测试结果" >> test-report.md
        echo "" >> test-report.md
        echo "| 平台 | 状态 |" >> test-report.md
        echo "|------|------|" >> test-report.md
        
        if [ "${{ needs.test-windows.result }}" == "success" ]; then
          echo "| Windows | ✅ 通过 |" >> test-report.md
        else
          echo "| Windows | ❌ 失败 |" >> test-report.md
        fi
        
        if [ "${{ needs.test-macos.result }}" == "success" ]; then
          echo "| macOS | ✅ 通过 |" >> test-report.md
        else
          echo "| macOS | ❌ 失败 |" >> test-report.md
        fi
        
        echo "" >> test-report.md
        echo "## 文件大小" >> test-report.md
        echo "" >> test-report.md
        
        if [ -f "./artifacts/邮件分发-Windows/邮件分发-Windows.exe" ]; then
          size=$(du -h "./artifacts/邮件分发-Windows/邮件分发-Windows.exe" | cut -f1)
          echo "- Windows: $size" >> test-report.md
        fi
        
        if [ -f "./artifacts/邮件分发-macOS/邮件分发-macOS" ]; then
          size=$(du -h "./artifacts/邮件分发-macOS/邮件分发-macOS" | cut -f1)
          echo "- macOS: $size" >> test-report.md
        fi
        
        cat test-report.md
    
    - name: Upload test report
      uses: actions/upload-artifact@v4
      with:
        name: test-report
        path: test-report.md
